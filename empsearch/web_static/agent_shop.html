<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Shop — OAFC</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="/agent_shop.css">
</head>
<body>
<div class="page">
  <div class="panel shop-head">
    <div>
      <h2>🏬 Agent Shop</h2>
      <p class="muted">생성된 Agent 를 실행하고 관리합니다. 결과에는 생성 SQL 과 사용한 데이터/Ontology 근거가 표시됩니다.</p>
    </div>
    <div class="btn-row">
      <a class="btn" href="/agent-builder">＋ Agent 생성 (Builder)</a>
      <button class="ghost" id="btnBackup">Agent 백업</button>
      <button class="ghost" id="btnRestore">Agent 복원</button>
      <input type="file" id="restoreFile" accept=".json" hidden>
    </div>
  </div>

  <div class="shop-layout">
    <!-- 전체 데이터 구조 -->
    <aside class="panel shop-side">
      <h2>전체 데이터 구조</h2>
      <div id="dataStructure" class="muted">불러오는 중…</div>
    </aside>
    <div class="shop-main">
      <div class="agent-grid" id="agentGrid"></div>
    </div>
  </div>

  <!-- 실행/상세 모달 -->
  <div class="modal-back" id="runModal" hidden>
    <div class="modal panel">
      <h2 id="runTitle">Agent 실행</h2>
      <div id="agentDetail"></div>
      <div class="row" style="margin-top:10px">
        <input id="runInput" class="col" placeholder="질의 입력">
        <button id="btnRunGo">실행</button>
        <button class="ghost" id="btnRunClose">닫기</button>
      </div>
      <div id="runResult" class="muted" style="margin-top:12px">Agent 에게 질의를 입력하세요.</div>
    </div>
  </div>
</div>
<script src="/project.js"></script>
<script src="/agent_shop.js"></script>
</body>
</html>
