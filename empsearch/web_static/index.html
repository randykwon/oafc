<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OAFC: Ontology Agent Factory Creator</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="/home.css">
</head>
<body>
<div class="page">
  <section class="hero panel">
    <h1>OAFC</h1>
    <p class="sub">Ontology Agent Factory Creator</p>
    <p class="desc">정형 데이터, 비정형 데이터, 온톨로지, 의미 관계, Agent 설계를
      하나의 흐름으로 연결하는 로컬 웹 솔루션</p>
    <div id="homeMetrics" class="metrics"></div>
  </section>

  <div class="menu-grid" id="menuGrid"></div>

  <section class="panel">
    <h2>파이프라인 흐름</h2>
    <div class="flow-line">
      <span class="flow-node">Data Integrator<br><small>정형/비정형 수집 · 선택</small></span>
      <span class="flow-arrow">→</span>
      <span class="flow-node">Ontology Definer<br><small>의미 생성 · 편집 · 관계 · 버전</small></span>
      <span class="flow-arrow">→</span>
      <span class="flow-node">Agent Builder<br><small>설계 · 테스트</small></span>
      <span class="flow-arrow">→</span>
      <span class="flow-node">Agent Shop<br><small>실행 · 관리 · 백업 · 복원</small></span>
    </div>
  </section>
</div>
<script src="/project.js"></script>
<script src="/home.js"></script>
</body>
</html>
