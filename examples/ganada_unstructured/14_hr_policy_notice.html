<h1>2026년 하반기 HR 정책 공지</h1>
<ul>
  <li>재택근무는 주 2회까지 허용 (생산직 제외)</li>
  <li>평가(evaluation) 결과 이의신청은 통보 후 7일 이내</li>
  <li>부서 변경 요청은 분기별 1회 접수</li>
  <li>manager 승인 없는 근무지(work_location) 변경 불가</li>
</ul>
<p>문의: 인사문화실 헬프데스크</p>
