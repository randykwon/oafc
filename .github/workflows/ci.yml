name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall -q oafc tests
      - run: node --check oafc/web/app.js
      - run: python -m pytest -q
